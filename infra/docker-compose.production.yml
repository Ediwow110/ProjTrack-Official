# Production compose for ProjTrack backend.
#
# Place at /opt/projtrack/docker-compose.yml. Run with:
#   sudo docker compose --env-file backend.env.production up -d
#
# Builds from ./repo (cloned by infra/digitalocean-bootstrap.sh).

services:
  backend:
    build:
      context: ./repo
      dockerfile: Dockerfile.backend
      args:
        # Pass git commit SHA so the image carries an OCI revision label.
        # Override at build time: VCS_REF=$(git rev-parse HEAD) docker compose build backend
        VCS_REF: ${VCS_REF:-unknown}
    image: projtrack/backend:latest
    container_name: projtrack-backend
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: 768m
    memswap_limit: 768m
    pids_limit: 512
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - backend.env.production
    environment:
      MAIL_WORKER_ENABLED: "false"
      BACKUP_WORKER_ENABLED: "false"
      BACKUP_SCHEDULE_ENABLED: "false"
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health/api-ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./data/uploads-fallback:/app/uploads
      - ./data/backups:/app/data/system-tools/backups
    networks:
      - projtrack

  mail-worker:
    image: projtrack/backend:latest
    container_name: projtrack-mail-worker
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - backend.env.production
    environment:
      MAIL_WORKER_ENABLED: "true"
      BACKUP_WORKER_ENABLED: "false"
      BACKUP_SCHEDULE_ENABLED: "false"
    command: ["node", "dist/worker.js"]
    healthcheck:
      disable: true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - projtrack

  backup-worker:
    image: projtrack/backend:latest
    container_name: projtrack-backup-worker
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 768m
    memswap_limit: 768m
    pids_limit: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - backend.env.production
    environment:
      MAIL_WORKER_ENABLED: "false"
      BACKUP_WORKER_ENABLED: "true"
      BACKUP_SCHEDULE_ENABLED: "true"
    command: ["node", "dist/worker.js"]
    healthcheck:
      disable: true
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./data/backups:/app/data/system-tools/backups
    networks:
      - projtrack

  clamav:
    image: clamav/clamav:stable
    container_name: projtrack-clamav
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: 1536m
    memswap_limit: 1536m
    pids_limit: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    volumes:
      - clamav-db:/var/lib/clamav
    networks:
      - projtrack

volumes:
  clamav-db:

networks:
  projtrack:
    driver: bridge
