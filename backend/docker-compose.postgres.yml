services:
  postgres:
    image: postgres:16
    container_name: projtrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: projtrack
      POSTGRES_USER: projtrack
      POSTGRES_PASSWORD: projtrack
    ports:
      - "5432:5432"
    volumes:
      - projtrack_postgres_data:/var/lib/postgresql/data

volumes:
  projtrack_postgres_data:
