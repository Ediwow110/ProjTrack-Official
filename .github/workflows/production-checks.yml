name: Production Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [production-hardening-test]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend production gate
    runs-on: ubuntu-latest
    env:
      CI: "true"
      NODE_ENV: production
      APP_ENV: production
      CI_PRODUCTION_BUILD: "true"
      VITE_USE_BACKEND: "true"
      VITE_API_BASE_URL: https://api.projtrack.codes
      VITE_PUBLIC_APP_URL: https://www.projtrack.codes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --include=dev
      - run: npm run security:secrets
      - run: npm run check:release-hygiene
      - run: npm run check:frontend-env:production
      - run: npm run typecheck
      - run: npm run build:production-fixture
      - run: npm audit --audit-level=high

  backend:
    name: Backend production gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: projtrack
          POSTGRES_USER: projtrack
          POSTGRES_PASSWORD: projtrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U projtrack -d projtrack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: "true"
      NODE_ENV: test
      APP_ENV: test
      DATABASE_URL: postgresql://projtrack:projtrack@localhost:5432/projtrack
      JWT_ACCESS_SECRET: ci-access-secret-for-production-checks-only-0000000000000000
      JWT_REFRESH_SECRET: ci-refresh-secret-for-production-checks-only-000000000000000
      ACCOUNT_ACTION_TOKEN_ENC_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      APP_URL: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:3001
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      MAIL_PROVIDER: stub
      MAIL_FROM: noreply@projtrack.local
      MAIL_WORKER_ENABLED: "false"
      MAIL_WORKER_POLL_MS: "60000"
      OBJECT_STORAGE_MODE: local
      FILE_STORAGE_MODE: local
      HTTP_RATE_LIMIT_STORE: memory
      FILE_MALWARE_SCAN_MODE: disabled
      BACKUP_WORKER_ENABLED: "false"
      BACKUP_SCHEDULE_ENABLED: "false"
      BACKUP_WORKER_POLL_MS: "60000"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --include=dev
      - run: npm --prefix .. run security:secrets
      - run: npm --prefix .. run check:release-hygiene
      - run: npx prisma validate --schema prisma/schema.prisma
      - run: npx prisma generate --schema prisma/schema.prisma
      - run: npx prisma migrate deploy --schema prisma/schema.prisma
      - run: npm run build
      - run: npm run check:boot:production
      - run: npm run check:boot:worker
      - run: npm test
      - run: npm audit --audit-level=high

  smoke:
    name: Playwright smoke gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [frontend, backend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: projtrack
          POSTGRES_USER: projtrack
          POSTGRES_PASSWORD: projtrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U projtrack -d projtrack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: "true"
      NODE_ENV: test
      APP_ENV: test
      DATABASE_URL: postgresql://projtrack:projtrack@localhost:5432/projtrack
      JWT_ACCESS_SECRET: playwright-access-secret-for-production-checks-only-000000
      JWT_REFRESH_SECRET: playwright-refresh-secret-for-production-checks-only-0000
      ACCOUNT_ACTION_TOKEN_ENC_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      APP_URL: http://127.0.0.1:4173
      FRONTEND_URL: http://127.0.0.1:4173
      BACKEND_URL: http://127.0.0.1:3001
      CORS_ORIGINS: http://127.0.0.1:4173
      MAIL_PROVIDER: stub
      MAIL_FROM: noreply@projtrack.local
      MAIL_WORKER_ENABLED: "false"
      MAIL_WORKER_POLL_MS: "60000"
      OBJECT_STORAGE_MODE: local
      FILE_STORAGE_MODE: local
      HTTP_RATE_LIMIT_STORE: memory
      FILE_MALWARE_SCAN_MODE: disabled
      BACKUP_WORKER_ENABLED: "false"
      BACKUP_SCHEDULE_ENABLED: "false"
      BACKUP_WORKER_POLL_MS: "60000"
      VITE_USE_BACKEND: "true"
      VITE_API_BASE_URL: http://127.0.0.1:3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
      - run: npm ci --include=dev
      - run: npm --prefix backend ci --include=dev
      - run: npx playwright install --with-deps chromium
      - run: npm --prefix backend run prisma:generate
      - run: npm --prefix backend run prisma:migrate:deploy
      - run: npm --prefix backend run build
      - run: npm run e2e:smoke
        timeout-minutes: 15
